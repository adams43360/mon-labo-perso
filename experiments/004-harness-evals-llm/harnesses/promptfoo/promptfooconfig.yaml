# Harness promptfoo — mêmes dataset/prompt/paramètres que le harness maison.
#
#   npm run gen:promptfoo          # régénère tests.yaml depuis data/dataset.json
#   cd harnesses/promptfoo
#   npx promptfoo@latest eval      # ANTHROPIC_API_KEY / OPENAI_API_KEY dans l'env
#   npx promptfoo@latest view      # rapport web local

description: "004 — classification messages RH (comparatif harness d'évals)"

prompts:
  - file://prompt.json

providers:
  - id: anthropic:messages:claude-haiku-4-5-20251001
    config:
      temperature: 0
      max_tokens: 10
  - id: openai:chat:gpt-4o-mini
    config:
      temperature: 0
      max_tokens: 10

tests: file://tests.yaml
